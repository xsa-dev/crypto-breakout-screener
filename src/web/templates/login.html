{% extends "base.html" %}
{% block title %}Вход — Tradebot Admin{% endblock %}

{# Логин-страница без шапки навигации — целиком переопределяем body. #}
{% block body %}
<main style="max-width: 360px; margin: 12vh auto; padding: 0 24px;">
  <h1 style="text-align: center; margin-bottom: 24px;">Tradebot Admin</h1>
  <div class="panel">
    <form method="post" action="/login">
      <div class="field" style="margin-bottom: 16px;">
        <label for="password">Пароль</label>
        <input type="password" name="password" id="password" autofocus required>
      </div>
      {% if error %}
        <div class="errors" style="margin-bottom: 16px;">{{ error }}</div>
      {% endif %}
      <button type="submit" class="primary" style="width: 100%;">Войти</button>
    </form>
  </div>
</main>
{% endblock %}
